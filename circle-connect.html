<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TRACE — Circle Connect</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap');

  :root {
    --bg: #080a0f;
    --surface: #0d1017;
    --line: #1a2030;
    --text: #e8eaf0;
    --muted: #3a4055;
    --c1: #00e5ff;
    --c2: #ff4081;
    --c3: #76ff03;
    --c4: #ffd740;
    --c5: #e040fb;
    --c6: #ff6d00;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; -webkit-user-select: none; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    z-index: 100;
    background: linear-gradient(to bottom, rgba(8,10,15,0.95), transparent);
    pointer-events: none;
  }

  #hud-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    color: var(--text);
    opacity: 0.5;
  }

  #hud-right {
    display: flex;
    gap: 32px;
    align-items: center;
  }

  .hud-stat {
    text-align: right;
  }

  .hud-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .hud-value {
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 1px;
  }

  #timer-bar-wrap {
    position: fixed;
    top: 64px; left: 0; right: 0;
    height: 2px;
    background: var(--line);
    z-index: 100;
  }

  #timer-bar {
    height: 100%;
    background: var(--c1);
    transition: width 0.1s linear, background 0.5s;
    transform-origin: left;
  }

  #canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }

  /* SCREENS */
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    background: var(--bg);
    transition: opacity 0.4s;
  }

  .screen.hidden {
    opacity: 0;
    pointer-events: none;
  }

  #start-screen .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(72px, 15vw, 120px);
    letter-spacing: 8px;
    background: linear-gradient(135deg, var(--c1), var(--c5));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 4px;
  }

  #start-screen .tagline {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 60px;
  }

  .btn {
    background: transparent;
    border: 1px solid var(--muted);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 14px 40px;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active, .btn:hover {
    border-color: var(--c1);
    color: var(--c1);
    box-shadow: 0 0 20px rgba(0,229,255,0.15);
  }

  .btn.primary {
    border-color: var(--c1);
    color: var(--c1);
  }

  .how-to {
    margin-top: 40px;
    display: flex;
    gap: 32px;
    opacity: 0.4;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--text);
  }

  .how-to span::before {
    content: '— ';
  }

  #game-over-screen .big-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(56px, 12vw, 96px);
    letter-spacing: 6px;
    color: var(--text);
    opacity: 0.15;
  }

  #game-over-screen .final-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(80px, 18vw, 160px);
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--c1), var(--c5));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 0.9;
    margin-bottom: 8px;
  }

  #game-over-screen .score-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 48px;
    text-transform: uppercase;
  }

  #game-over-screen .stats-row {
    display: flex;
    gap: 48px;
    margin-bottom: 52px;
    opacity: 0.6;
  }

  .stat-item {
    text-align: center;
  }

  .stat-n {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    color: var(--text);
  }

  .stat-l {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Level flash */
  #level-flash {
    position: fixed;
    inset: 0;
    z-index: 150;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }

  #level-flash .lf-inner {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 10vw, 80px);
    letter-spacing: 6px;
    color: var(--text);
  }

  /* Combo flash */
  #combo-flash {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 150;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="hud">
  <div id="hud-title">TRACE</div>
  <div id="hud-right">
    <div class="hud-stat">
      <div class="hud-label">Level</div>
      <div class="hud-value" id="hud-level">1</div>
    </div>
    <div class="hud-stat">
      <div class="hud-label">Combo</div>
      <div class="hud-value" id="hud-combo">×1</div>
    </div>
    <div class="hud-stat">
      <div class="hud-label">Score</div>
      <div class="hud-value" id="hud-score">0</div>
    </div>
  </div>
</div>

<div id="timer-bar-wrap"><div id="timer-bar"></div></div>

<div id="level-flash"><div class="lf-inner" id="lf-text"></div></div>
<div id="combo-flash" id="combo-flash"></div>

<!-- START SCREEN -->
<div class="screen" id="start-screen">
  <div class="logo">TRACE</div>
  <div class="tagline">Draw the path. Connect the dots.</div>
  <button class="btn primary" id="start-btn">Begin</button>
  <div class="how-to">
    <span>Follow the guide path</span>
    <span>Match by color</span>
    <span>Stay on track</span>
  </div>
</div>

<!-- GAME OVER SCREEN -->
<div class="screen hidden" id="game-over-screen">
  <div class="big-label">FINAL SCORE</div>
  <div class="final-score" id="final-score-val">0</div>
  <div class="score-label">Points</div>
  <div class="stats-row">
    <div class="stat-item"><div class="stat-n" id="stat-matched">0</div><div class="stat-l">Matched</div></div>
    <div class="stat-item"><div class="stat-n" id="stat-level">0</div><div class="stat-l">Level</div></div>
    <div class="stat-item"><div class="stat-n" id="stat-best">×1</div><div class="stat-l">Best Combo</div></div>
  </div>
  <button class="btn primary" id="restart-btn">Play Again</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// HUD
const hudScore = document.getElementById('hud-score');
const hudLevel = document.getElementById('hud-level');
const hudCombo = document.getElementById('hud-combo');
const timerBar = document.getElementById('timer-bar');
const levelFlash = document.getElementById('level-flash');
const lfText = document.getElementById('lf-text');
const comboFlash = document.getElementById('combo-flash');
const startScreen = document.getElementById('start-screen');
const gameOverScreen = document.getElementById('game-over-screen');
const finalScoreVal = document.getElementById('final-score-val');

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

// Colors
const COLORS = ['#00e5ff','#ff4081','#76ff03','#ffd740','#e040fb','#ff6d00'];
const COLOR_NAMES = ['cyan','rose','lime','amber','violet','orange'];

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Game state
let gameActive = false;
let score = 0;
let combo = 1;
let bestCombo = 1;
let level = 1;
let matched = 0;
let timeLeft = 0;
let totalTime = 0;
let timerInterval = null;
let pairs = [];
let activeDrag = null; // { pairIdx, drawing: [{x,y}], startCircle }
let particles = [];
let trailEffects = [];
let successFlashes = [];

const CIRCLE_R = 28;
const GUIDE_DOT_SPACING = 18;
const DRAG_TOLERANCE = 36; // how far from guide path before fail

// Level config
function getLevelConfig(lvl) {
  return {
    pairCount: Math.min(1 + Math.floor((lvl - 1) / 2), 5),
    timeBonus: 12,
    baseTime: Math.max(40 - lvl * 2, 20),
    pathComplexity: Math.min(lvl, 5),
    speed: 1 + lvl * 0.05
  };
}

function startGame() {
  score = 0; combo = 1; bestCombo = 1; level = 1; matched = 0;
  pairs = [];
  activeDrag = null;
  particles = [];
  trailEffects = [];
  startScreen.classList.add('hidden');
  gameOverScreen.classList.add('hidden');
  gameActive = true;
  updateHUD();
  startLevel();
  requestAnimationFrame(loop);
}

function startLevel() {
  const cfg = getLevelConfig(level);
  totalTime = cfg.baseTime;
  timeLeft = totalTime;
  pairs = generatePairs(cfg.pairCount, cfg.pathComplexity);
  updateTimerBar();
  hudLevel.textContent = level;

  // Level flash
  lfText.textContent = `LEVEL ${level}`;
  levelFlash.style.opacity = '1';
  setTimeout(() => levelFlash.style.opacity = '0', 900);

  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(tick, 100);
}

function tick() {
  if (!gameActive) return;
  timeLeft -= 0.1;
  if (timeLeft <= 0) {
    timeLeft = 0;
    endGame();
  }
  updateTimerBar();
}

function updateTimerBar() {
  const pct = Math.max(0, timeLeft / totalTime * 100);
  timerBar.style.width = pct + '%';
  if (pct > 50) timerBar.style.background = 'var(--c1)';
  else if (pct > 25) timerBar.style.background = 'var(--c4)';
  else timerBar.style.background = 'var(--c2)';
}

function endGame() {
  gameActive = false;
  clearInterval(timerInterval);
  gameOverScreen.classList.remove('hidden');
  finalScoreVal.textContent = score;
  document.getElementById('stat-matched').textContent = matched;
  document.getElementById('stat-level').textContent = level;
  document.getElementById('stat-best').textContent = '×' + bestCombo;
}

function updateHUD() {
  hudScore.textContent = score;
  hudCombo.textContent = '×' + combo;
}

// === PAIR/PATH GENERATION ===
function generatePairs(count, complexity) {
  const result = [];
  const usedColors = [];
  const margin = 80;
  const minDist = 180;

  for (let i = 0; i < count; i++) {
    let colorIdx = i % COLORS.length;
    usedColors.push(colorIdx);

    // Place circles avoiding overlap
    let a, b, tries = 0;
    do {
      a = randomPoint(margin);
      tries++;
    } while (tries < 50 && result.some(p => dist(a, p.a) < minDist || dist(a, p.b) < minDist));

    tries = 0;
    do {
      b = randomPoint(margin);
      tries++;
    } while (tries < 50 && (dist(a, b) < minDist * 1.5 || result.some(p => dist(b, p.a) < minDist || dist(b, p.b) < minDist)));

    const path = generateGuidePath(a, b, complexity);
    result.push({ a, b, color: COLORS[colorIdx], path, solved: false, failing: false });
  }
  return result;
}

function randomPoint(margin) {
  const topPad = 90;
  return {
    x: margin + Math.random() * (W - margin * 2),
    y: topPad + margin + Math.random() * (H - topPad - margin * 2)
  };
}

function generateGuidePath(a, b, complexity) {
  const pts = [a];
  const waypoints = Math.min(complexity, 4);

  // Generate control waypoints
  const wps = [];
  for (let i = 0; i < waypoints; i++) {
    const t = (i + 1) / (waypoints + 1);
    const base = lerp2(a, b, t);
    const perp = perpendicular(a, b);
    const offset = (Math.random() - 0.5) * Math.min(W, H) * 0.3 * (complexity * 0.2 + 0.2);
    wps.push({
      x: base.x + perp.x * offset,
      y: base.y + perp.y * offset
    });
  }

  // Build smooth path through waypoints
  const allPts = [a, ...wps, b];
  const path = [];
  for (let i = 0; i < allPts.length - 1; i++) {
    const p0 = allPts[Math.max(0, i - 1)];
    const p1 = allPts[i];
    const p2 = allPts[i + 1];
    const p3 = allPts[Math.min(allPts.length - 1, i + 2)];
    const steps = Math.ceil(dist(p1, p2) / GUIDE_DOT_SPACING);
    for (let j = 0; j <= steps; j++) {
      const t = j / steps;
      path.push(catmullRom(p0, p1, p2, p3, t));
    }
  }
  return path;
}

function catmullRom(p0, p1, p2, p3, t) {
  const t2 = t * t, t3 = t2 * t;
  return {
    x: 0.5 * ((2 * p1.x) + (-p0.x + p2.x) * t + (2*p0.x - 5*p1.x + 4*p2.x - p3.x) * t2 + (-p0.x + 3*p1.x - 3*p2.x + p3.x) * t3),
    y: 0.5 * ((2 * p1.y) + (-p0.y + p2.y) * t + (2*p0.y - 5*p1.y + 4*p2.y - p3.y) * t2 + (-p0.y + 3*p1.y - 3*p2.y + p3.y) * t3)
  };
}

function lerp2(a, b, t) { return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t }; }
function perpendicular(a, b) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const len = Math.sqrt(dx*dx + dy*dy) || 1;
  return { x: -dy / len, y: dx / len };
}
function dist(a, b) { return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2); }

// === TOUCH/POINTER INPUT ===
function getPos(e) {
  const t = e.touches ? e.touches[0] : e;
  const rect = canvas.getBoundingClientRect();
  return { x: t.clientX - rect.left, y: t.clientY - rect.top };
}

function onDown(e) {
  if (!gameActive) return;
  e.preventDefault();
  const pos = getPos(e);

  // Find which circle was touched
  for (let i = 0; i < pairs.length; i++) {
    const p = pairs[i];
    if (p.solved) continue;
    if (dist(pos, p.a) < CIRCLE_R + 10) {
      activeDrag = { pairIdx: i, drawing: [pos], startCircle: 'a', progress: 0 };
      return;
    }
    if (dist(pos, p.b) < CIRCLE_R + 10) {
      activeDrag = { pairIdx: i, drawing: [pos], startCircle: 'b', progress: 0 };
      return;
    }
  }
}

function onMove(e) {
  if (!gameActive || !activeDrag) return;
  e.preventDefault();
  const pos = getPos(e);
  activeDrag.drawing.push(pos);

  const p = pairs[activeDrag.pairIdx];
  const path = activeDrag.startCircle === 'a' ? p.path : [...p.path].reverse();

  // Find how far along path we are
  const lastPt = activeDrag.drawing[activeDrag.drawing.length - 1];
  let closestDist = Infinity;
  let closestIdx = 0;
  for (let i = 0; i < path.length; i++) {
    const d = dist(lastPt, path[i]);
    if (d < closestDist) { closestDist = d; closestIdx = i; }
  }

  activeDrag.progress = closestIdx / (path.length - 1);

  // Check if too far off path
  if (closestDist > DRAG_TOLERANCE) {
    // Fail - shake effect
    p.failing = true;
    spawnFailParticles(lastPt);
    setTimeout(() => { if (p) p.failing = false; }, 300);
    combo = 1;
    updateHUD();
    activeDrag = null;
    return;
  }

  // Check if reached end circle
  const endCircle = activeDrag.startCircle === 'a' ? p.b : p.a;
  if (dist(lastPt, endCircle) < CIRCLE_R + 10 && activeDrag.progress > 0.7) {
    solveMatch(activeDrag.pairIdx);
    activeDrag = null;
  }
}

function onUp(e) {
  activeDrag = null;
}

canvas.addEventListener('pointerdown', onDown, { passive: false });
canvas.addEventListener('pointermove', onMove, { passive: false });
canvas.addEventListener('pointerup', onUp);
canvas.addEventListener('pointercancel', onUp);
canvas.addEventListener('touchstart', onDown, { passive: false });
canvas.addEventListener('touchmove', onMove, { passive: false });
canvas.addEventListener('touchend', onUp);

// === SOLVE ===
function solveMatch(idx) {
  const p = pairs[idx];
  p.solved = true;
  matched++;
  combo = Math.min(combo + 1, 8);
  if (combo > bestCombo) bestCombo = combo;
  const pts = Math.round(100 * combo);
  score += pts;
  timeLeft = Math.min(timeLeft + 4, totalTime);
  updateHUD();

  spawnSuccessParticles(p.a, p.color);
  spawnSuccessParticles(p.b, p.color);
  successFlashes.push({ x: (p.a.x + p.b.x) / 2, y: (p.a.y + p.b.y) / 2, color: p.color, t: 1 });

  showComboFlash(combo, pts);

  const allSolved = pairs.every(pp => pp.solved);
  if (allSolved) {
    setTimeout(() => {
      level++;
      startLevel();
    }, 600);
  }
}

function showComboFlash(c, pts) {
  if (c < 2) return;
  comboFlash.textContent = `×${c} COMBO  +${pts}`;
  comboFlash.style.color = COLORS[(c - 2) % COLORS.length];
  comboFlash.style.opacity = '1';
  setTimeout(() => comboFlash.style.opacity = '0', 700);
}

// === PARTICLES ===
function spawnSuccessParticles(center, color) {
  for (let i = 0; i < 18; i++) {
    const angle = (Math.PI * 2 * i) / 18 + Math.random() * 0.3;
    const speed = 2 + Math.random() * 5;
    particles.push({
      x: center.x, y: center.y,
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      life: 1, decay: 0.025 + Math.random() * 0.02,
      r: 2 + Math.random() * 3,
      color
    });
  }
}

function spawnFailParticles(center) {
  for (let i = 0; i < 8; i++) {
    const angle = Math.random() * Math.PI * 2;
    particles.push({
      x: center.x, y: center.y,
      vx: Math.cos(angle) * 3, vy: Math.sin(angle) * 3,
      life: 1, decay: 0.06,
      r: 2,
      color: '#ff4081'
    });
  }
}

// === DRAW ===
let lastTime = 0;
function loop(ts) {
  if (!gameActive) return;
  const dt = Math.min((ts - lastTime) / 16, 3);
  lastTime = ts;

  ctx.clearRect(0, 0, W, H);

  drawGrid();
  drawPairs(dt);
  drawParticles(dt);
  drawSuccessFlashes(dt);

  requestAnimationFrame(loop);
}

function drawGrid() {
  ctx.strokeStyle = 'rgba(26,32,48,0.5)';
  ctx.lineWidth = 1;
  const spacing = 48;
  for (let x = 0; x < W; x += spacing) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += spacing) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawPairs(dt) {
  pairs.forEach((p, i) => {
    if (p.solved) {
      drawSolvedPair(p);
      return;
    }

    const isActive = activeDrag && activeDrag.pairIdx === i;
    const path = activeDrag && activeDrag.startCircle === 'b' ? [...p.path].reverse() : p.path;

    // Draw guide path (dashed dots)
    drawGuidePath(p, isActive, path);

    // Draw circles
    const shake = p.failing ? (Math.random() - 0.5) * 6 : 0;
    drawCircle(p.a.x + shake, p.a.y + shake, p.color, isActive && activeDrag.startCircle === 'a', p.failing);
    drawCircle(p.b.x + shake, p.b.y + shake, p.color, isActive && activeDrag.startCircle === 'b', p.failing);

    // Draw user trail
    if (isActive && activeDrag.drawing.length > 1) {
      drawUserTrail(activeDrag.drawing, p.color, activeDrag.progress);
    }
  });
}

function drawGuidePath(p, isActive, path) {
  const progress = isActive ? activeDrag.progress : 0;

  for (let i = 0; i < path.length; i++) {
    const t = i / (path.length - 1);
    const pt = path[i];
    const isPassed = t <= progress;

    if (i % 3 !== 0) continue; // subsample

    ctx.beginPath();
    ctx.arc(pt.x, pt.y, 2, 0, Math.PI * 2);

    if (isPassed) {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = 0.8;
    } else {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = isActive ? 0.15 : 0.1;
    }
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Arrow hints along path
  if (!isActive) {
    for (let i = 10; i < path.length - 5; i += Math.floor(path.length / 4)) {
      const pt = path[i];
      const pt2 = path[Math.min(i + 4, path.length - 1)];
      const angle = Math.atan2(pt2.y - pt.y, pt2.x - pt.x);
      ctx.save();
      ctx.translate(pt.x, pt.y);
      ctx.rotate(angle);
      ctx.strokeStyle = p.color;
      ctx.globalAlpha = 0.18;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-5, -4); ctx.lineTo(0, 0); ctx.lineTo(-5, 4);
      ctx.stroke();
      ctx.restore();
      ctx.globalAlpha = 1;
    }
  }
}

function drawUserTrail(drawing, color, progress) {
  if (drawing.length < 2) return;

  // Glowing trail
  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Outer glow
  ctx.strokeStyle = color;
  ctx.lineWidth = 12;
  ctx.globalAlpha = 0.08;
  ctx.beginPath();
  ctx.moveTo(drawing[0].x, drawing[0].y);
  for (let i = 1; i < drawing.length; i++) ctx.lineTo(drawing[i].x, drawing[i].y);
  ctx.stroke();

  // Main line
  ctx.lineWidth = 3;
  ctx.globalAlpha = 0.9;
  ctx.shadowBlur = 8;
  ctx.shadowColor = color;
  ctx.beginPath();
  ctx.moveTo(drawing[0].x, drawing[0].y);
  for (let i = 1; i < drawing.length; i++) ctx.lineTo(drawing[i].x, drawing[i].y);
  ctx.stroke();

  ctx.restore();

  // Trail dots
  const recent = drawing.slice(-20);
  recent.forEach((pt, i) => {
    const a = i / recent.length;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, 2 * a, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.globalAlpha = a * 0.6;
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawSolvedPair(p) {
  // Draw solved path
  ctx.save();
  ctx.strokeStyle = p.color;
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.25;
  ctx.setLineDash([4, 6]);
  ctx.beginPath();
  ctx.moveTo(p.path[0].x, p.path[0].y);
  for (let i = 1; i < p.path.length; i++) ctx.lineTo(p.path[i].x, p.path[i].y);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // Circles with checkmark effect
  drawCircle(p.a.x, p.a.y, p.color, false, false, true);
  drawCircle(p.b.x, p.b.y, p.color, false, false, true);
}

function drawCircle(x, y, color, isSource, isFailing, isSolved = false) {
  ctx.save();

  // Outer ring glow
  const glowSize = isSource ? 20 : 14;
  const grad = ctx.createRadialGradient(x, y, CIRCLE_R * 0.5, x, y, CIRCLE_R + glowSize);
  grad.addColorStop(0, color + '40');
  grad.addColorStop(1, color + '00');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, CIRCLE_R + glowSize, 0, Math.PI * 2);
  ctx.fill();

  // Circle background
  ctx.beginPath();
  ctx.arc(x, y, CIRCLE_R, 0, Math.PI * 2);
  ctx.fillStyle = isSolved ? color + '22' : '#0d1017';
  ctx.fill();

  // Stroke
  ctx.strokeStyle = isFailing ? '#ff4081' : color;
  ctx.lineWidth = isSolved ? 1.5 : (isSource ? 2.5 : 2);
  ctx.globalAlpha = isSolved ? 0.4 : 1;
  if (isSource) {
    ctx.shadowBlur = 16;
    ctx.shadowColor = color;
  }
  ctx.stroke();

  // Inner dot
  if (!isSolved) {
    ctx.beginPath();
    ctx.arc(x, y, isSource ? 6 : 4, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.globalAlpha = isSource ? 1 : 0.7;
    ctx.fill();
  } else {
    // Checkmark
    ctx.strokeStyle = color;
    ctx.globalAlpha = 0.5;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x - 8, y); ctx.lineTo(x - 3, y + 6); ctx.lineTo(x + 8, y - 6);
    ctx.stroke();
  }

  ctx.restore();
}

function drawParticles(dt) {
  particles = particles.filter(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 0.08 * dt;
    p.life -= p.decay * dt;
    if (p.life <= 0) return false;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life * 0.8;
    ctx.fill();
    ctx.globalAlpha = 1;
    return true;
  });
}

function drawSuccessFlashes(dt) {
  successFlashes = successFlashes.filter(f => {
    f.t -= 0.03 * dt;
    if (f.t <= 0) return false;
    ctx.beginPath();
    ctx.arc(f.x, f.y, (1 - f.t) * 60 + 10, 0, Math.PI * 2);
    ctx.strokeStyle = f.color;
    ctx.lineWidth = 2;
    ctx.globalAlpha = f.t * 0.4;
    ctx.stroke();
    ctx.globalAlpha = 1;
    return true;
  });
}
